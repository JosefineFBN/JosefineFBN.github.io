<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crimes of San Fransisco: Two decades of crime data</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }

        header {
            background-color: #333;
            color: #fff;
            padding: 40px 20px;
            text-align: center;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        .visualization-container {
            background-color: #fff;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            padding: 40px;
            margin-bottom: 60px;
        }

        .visualization-container h2,
        .visualization-container h3,
        .visualization-container h4 {
            color: #333;
            margin-top: 0;
        }

        .visualization-container img {
            max-width: 100%;
            height: auto;
        }

        .visualization-container iframe {
            width: 100%;
            height: 600px;
            border: none;
        }
    </style>
</head>
<body>
    <header>
        <h1>Crimes of San Fransisco: Two decades of crime data</h1>
    </header>

    <div class="container">
        <div class="visualization-container">
            <h2>Linear Regression visualisation</h2>
            <img src="Images/Linear_regression_betweenCrimes.png" alt="Linear Regression Visualization">
        </div>

        <div class="visualization-container">
            <h3>Interactive crime visualization</h3>
            <iframe src="Visualization/crime_hourly_interactive.html"></iframe>
        </div>

        <div class="visualization-container">
            <h4>Heat map</h4>
            <iframe src="Visualization/sf_crime_heatmap.html"></iframe>
        </div>
    </div>
</body>
</html>
